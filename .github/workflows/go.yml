name: Tag Go module

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["go/VERSION"]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "v=$(cat go/VERSION)" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          TAG="go/v${{ steps.version.outputs.v }}"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="go/v${{ steps.version.outputs.v }}"
          git tag "$TAG"
          git push origin "$TAG"
